apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: pyspark-analysis
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  # 替换为教师提供的 SWR PySpark 镜像地址或您自己构建的镜像地址
  image: swr.cn-south-1.myhuaweicloud.com/yangchi/pyspark:3.4
  imagePullPolicy: Always
  mainApplicationFile: local:///opt/spark/work/analysis.py
  sparkVersion: "3.4.0"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    coreRequest: "100m"
    memory: "512m"
    labels:
      version: 3.4.0
    serviceAccount: spark
  executor:
    cores: 1
    coreRequest: "100m"
    instances: 2
    memory: "512m"
    labels:
      version: 3.4.0
