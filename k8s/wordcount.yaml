apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: pyspark-wordcount
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: swr.cn-south-1.myhuaweicloud.com/yangchi/pyspark:3.4
  imagePullPolicy: Always
  mainApplicationFile: local:///opt/spark/work/wordcount.py
  arguments:
    - "local:///opt/spark/README.md"
  sparkVersion: "3.4.0"
  restartPolicy:
    type: Never
  driver:
    cores: 1
    coreRequest: "100m"
    memory: "1g"
    labels:
      version: 3.4.0
    serviceAccount: spark
  executor:
    cores: 1
    coreRequest: "100m"
    instances: 2
    memory: "1g"
    labels:
      version: 3.4.0
