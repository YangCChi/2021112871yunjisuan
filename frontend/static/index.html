<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>云计算技术课程设计</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 40px;
            text-align: center;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: 0 auto;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
        .highlight {
            font-weight: bold;
            color: #2980b9;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        .checking { background-color: #ffeaa7; color: #d63031; }
        .success { background-color: #55efc4; color: #00b894; }
        .failed { background-color: #ff7675; color: #d63031; }
    </style>
</head>
<body>
    <div class="container">
        <h1>云计算技术 课程设计</h1>
        <br>
        <p>姓名：<span class="highlight">杨驰</span></p>
        <p>学号：<span class="highlight">2021112871</span></p>
        
        <!-- 后端连接检测 -->
        <div id="status" class="status checking">正在检测后端服务连接...</div>
    </div>

    <script>
        // 检测后端 /api/ping 接口是否通畅
        fetch('/api/ping')
            .then(response => {
                if (!response.ok) throw new Error('网络异常');
                return response.json();
            })
            .then(data => {
                if (data.status === 'ok') {
                    const statusEl = document.getElementById('status');
                    statusEl.className = 'status success';
                    statusEl.innerText = '后端连接成功！(API /api/ping 响应正常)';
                }
            })
            .catch(error => {
                const statusEl = document.getElementById('status');
                statusEl.className = 'status failed';
                statusEl.innerText = '后端连接失败，请确保本地 docker compose 运行正常。';
            });
    </script>
</body>
</html>
